apiVersion: v1
kind: Namespace
metadata:
  name: azure-devops-mcp
  labels:
    name: azure-devops-mcp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: azure-devops-mcp
data:
  # Organization name for Azure DevOps
  ORGANIZATION: "your-organization"
  # Transport type: stdio, http, or sse
  TRANSPORT: "http"
  # Log level: debug, info, warn, error
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secrets
  namespace: azure-devops-mcp
type: Opaque
stringData:
  # Azure DevOps Personal Access Token
  AZURE_DEVOPS_PAT: "your-pat-token"
  # Azure AD / Entra ID Configuration
  AZURE_AD_CLIENT_ID: "your-client-id"
  AZURE_AD_CLIENT_SECRET: "your-client-secret"
  AZURE_AD_TENANT_ID: "your-tenant-id"
  # JWT Secret for session signing
  JWT_SECRET: "your-jwt-secret"
  # CORS origin for auth callbacks
  CORS_ORIGIN: "http://localhost:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
  labels:
    app: azure-devops-mcp
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: azure-devops-mcp
  template:
    metadata:
      labels:
        app: azure-devops-mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mcp-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp
          image: ghcr.io/fsaito-github/azure-devops-mcp:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: debug
              containerPort: 5005
              protocol: TCP

          env:
            # Configuration from ConfigMap
            - name: ORGANIZATION
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: ORGANIZATION
            - name: TRANSPORT
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: TRANSPORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: LOG_LEVEL
            # Secrets from Secret
            - name: AZURE_DEVOPS_PAT
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: AZURE_DEVOPS_PAT
            - name: AZURE_AD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: AZURE_AD_CLIENT_ID
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: AZURE_AD_CLIENT_SECRET
            - name: AZURE_AD_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: AZURE_AD_TENANT_ID
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: CORS_ORIGIN

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe for slow startups
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          # Resource limits and requests
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Volume mounts for logs
          volumeMounts:
            - name: logs
              mountPath: /var/log/mcp
            - name: tmp
              mountPath: /tmp

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - azure-devops-mcp
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
  labels:
    app: azure-devops-mcp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 5005
      targetPort: 5005
      protocol: TCP
      name: debug
  selector:
    app: azure-devops-mcp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: azure-devops-mcp
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-sa
  namespace: azure-devops-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-role
  namespace: azure-devops-mcp
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-rolebinding
  namespace: azure-devops-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-role
subjects:
  - kind: ServiceAccount
    name: mcp-sa
    namespace: azure-devops-mcp
