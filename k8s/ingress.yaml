apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mcp.your-domain.com
      secretName: mcp-tls-cert
  rules:
    - host: mcp.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: azure-devops-mcp
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-cert
  namespace: azure-devops-mcp
spec:
  secretName: mcp-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mcp.your-domain.com
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@your-domain.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: azure-devops-mcp
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: azure-devops-mcp
  namespace: azure-devops-mcp
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: azure-devops-mcp
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
